<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Globe Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div class="hud">
      <div class="title-wrap">
        <h1>Fantasy Globe Explorer</h1>
        <p>Drag to rotate • Scroll/pinch to zoom • Tap markers to explore</p>
      </div>

      <div class="controls">
        <button id="toggleLabels">Hide Labels</button>
        <button id="toggleRoutes">Hide Routes</button>
        <button id="toggleAutoSpin">Pause Spin</button>
        <button id="resetCamera">Reset View</button>
      </div>
    </div>

    <div id="globe"></div>

    <div class="legend">
      <div><span class="dot blue"></span>Blue Sea</div>
      <div><span class="dot gold"></span>Grand Route</div>
      <div><span class="dot red"></span>Danger Zone</div>
    </div>

    <div id="infoCard" class="info-card hidden">
      <button id="closeCard" class="close-btn">×</button>
      <h2 id="cardTitle">Location</h2>
      <p id="cardSubtitle" class="subtitle">Region</p>
      <p id="cardDescription">Tap a marker on the globe to show location details here.</p>
    </div>
  </div>

  <!-- ES module setup for three + addons (OrbitControls) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="app.js"></script>
</body>
</html>
